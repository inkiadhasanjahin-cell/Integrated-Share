<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Share · File Sharing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <div class="app-header">
            <i class="fas fa-share-nodes"></i>
            <h1>Integrated Share <span>local sharing</span></h1>
        </div>

        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>drag & drop files</h3>
                <p>or use the button to browse</p>
                <button class="select-btn" id="selectFilesBtn" type="button">
                    <i class="fas fa-folder-open"></i> choose files
                </button>
                <input type="file" id="fileInput" multiple hidden>
            </div>
        </div>

        <div class="shared-header">
            <h2><i class="fas fa-link"></i> shared files</h2>
            <span class="badge-light" id="fileCount">0 items</span>
        </div>

        <div id="fileList" class="file-list">
            <!-- Files will be loaded here -->
        </div>

        <div class="upload-progress" id="uploadProgress" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="progressText">Uploading...</span>
        </div>

        <div class="demo-note">
            <i class="fas fa-server"></i> Local Flask Server © 2026
            <button class="clear-btn" id="clearAllBtn" style="margin-left: 1rem; background: none; border: 1px solid #dbe7f5; padding: 0.2rem 0.8rem; border-radius: 20px; cursor: pointer; color: #7793b5;">
                <i class="fas fa-trash"></i> Clear All
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
